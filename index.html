<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiber Optic Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        #app-content { display: none; }
        .loader { border-top-color: #00B900; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="loading-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="loader ease-linear rounded-full border-4 border-gray-200 h-16 w-16 mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-700">กำลังเชื่อมต่อระบบ LINE...</h2>
    </div>

    <div id="app-content" class="max-w-md mx-auto bg-white min-h-screen shadow-md relative pb-10">
        <div class="bg-[#00B900] text-white p-4 shadow-sm flex items-center justify-between rounded-b-xl">
            <div>
                <h1 class="text-lg font-bold">ระบบเบิกจ่ายอุปกรณ์</h1>
                <p id="user-name-display" class="text-sm opacity-90">ผู้ใช้งาน: กำลังโหลด...</p>
            </div>
            <img id="user-profile-img" src="" alt="Profile" class="w-10 h-10 rounded-full border-2 border-white hidden">
        </div>

        <div class="p-4">
            <h2 class="text-gray-600 font-semibold mb-3">เลือกทำรายการ</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openMenu('consume')" class="bg-blue-50 border border-blue-200 p-3 rounded-xl flex flex-col items-center justify-center hover:bg-blue-100 transition shadow-sm">
                    <span class="text-2xl mb-1">🛒</span>
                    <span class="text-sm font-medium text-blue-700">เบิกใช้งาน (Cart)</span>
                </button>
                <button onclick="openMenu('history')" class="bg-yellow-50 border border-yellow-200 p-3 rounded-xl flex flex-col items-center justify-center hover:bg-yellow-100 transition shadow-sm">
                    <span class="text-2xl mb-1">📋</span>
                    <span class="text-sm font-medium text-yellow-700">ประวัติรายการ</span>
                </button>
                <button id="btn-transfer" onclick="openMenu('transfer')" class="bg-purple-50 border border-purple-200 p-3 rounded-xl flex flex-col items-center justify-center hover:bg-purple-100 transition shadow-sm hidden">
                    <span class="text-2xl mb-1">🔄</span>
                    <span class="text-sm font-medium text-purple-700">โอนข้ามทีม</span>
                </button>
                <button id="btn-receive" onclick="openMenu('receive')" class="bg-green-50 border border-green-200 p-3 rounded-xl flex flex-col items-center justify-center hover:bg-green-100 transition shadow-sm hidden">
                    <span class="text-2xl mb-1">📦</span>
                    <span class="text-sm font-medium text-green-700">รับของเข้า</span>
                </button>
            </div>

            <div class="mt-6">
                <h2 id="inventory-title" class="text-gray-600 font-semibold mb-3">สต๊อกคงเหลือของทีม</h2>
                <div id="inventory-list" class="space-y-3">
                    <div class="p-3 bg-gray-100 rounded-lg text-center text-sm text-gray-500">กำลังดึงข้อมูล...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="consume-form-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-lg w-11/12 max-w-md max-h-[90vh] overflow-y-auto p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-blue-700">🛒 ตะกร้าเบิกใช้งาน</h2>
                <button onclick="closeModal('consume-form-modal')" class="text-gray-500 hover:text-red-500 text-2xl font-bold">&times;</button>
            </div>
            <form id="consumeForm" onsubmit="submitCartForm(event)" class="space-y-4">
                
                <div class="bg-gray-50 p-3 rounded-lg border space-y-3">
                    <div id="consume-source-warehouse-block">
                        <label class="block text-xs font-medium text-gray-600 mb-1">เบิกจากคลัง/ทีม ไหน?</label>
                        <select id="consume-from" required onchange="resetCart()" class="w-full border border-gray-300 rounded p-2 text-sm outline-none"></select>
                    </div>
                    <div id="consume-target-user-block" class="hidden">
                        <label class="block text-xs font-medium text-gray-600 mb-1">เบิกแทนช่างคนไหน? (สำหรับ Admin)</label>
                        <input type="text" id="consume-target-user" class="w-full border border-gray-300 rounded p-2 text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">รหัสอ้างอิงงาน (Job/Ticket ID)</label>
                        <input type="text" id="consume-ref" required class="w-full border border-gray-300 rounded p-2 text-sm outline-none">
                    </div>
                </div>

                <div class="border border-blue-200 rounded-lg p-3 bg-blue-50/40">
                    <h3 class="text-sm font-bold text-blue-800 mb-2">✂️ รายการม้วนสาย Fiber</h3>
                    <div id="cart-fiber-container" class="space-y-3 empty:hidden mb-2"></div>
                    <button type="button" onclick="addFiberRow()" class="w-full text-xs font-bold text-blue-600 bg-white border border-blue-300 px-3 py-2 rounded shadow-sm hover:bg-blue-100">+ เพิ่มม้วนสาย Fiber</button>
                </div>

                <div class="border border-orange-200 rounded-lg p-3 bg-orange-50/40">
                    <h3 class="text-sm font-bold text-orange-800 mb-2">🔌 รายการอุปกรณ์ประกอบ</h3>
                    <div id="cart-acc-container" class="space-y-2 empty:hidden mb-2"></div>
                    <button type="button" onclick="addAccRow()" class="w-full text-xs font-bold text-orange-600 bg-white border border-orange-300 px-3 py-2 rounded shadow-sm hover:bg-orange-100">+ เพิ่มอุปกรณ์อื่น</button>
                </div>

                <div>
                    <label class="block text-xs text-gray-600 mb-1">หมายเหตุของใบงาน</label>
                    <input type="text" id="consume-remark" class="w-full border border-gray-300 rounded p-2 text-sm outline-none">
                </div>
                
                <div class="pt-3">
                    <button type="submit" id="btn-submit-cart" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-md">ยืนยันการเบิกทั้งหมด</button>
                </div>
            </form>
        </div>
    </div>

    <div id="receive-form-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-lg w-11/12 max-w-md max-h-[90vh] overflow-y-auto p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-green-700">📦 ฟอร์มรับของเข้าคลัง</h2>
                <button onclick="closeModal('receive-form-modal')" class="text-gray-500 hover:text-red-500 text-2xl font-bold">&times;</button>
            </div>
            <form id="receiveForm" onsubmit="submitTransactionForm(event, 'RECEIVE')" class="space-y-3">
                <select id="receive-to-warehouse" required class="w-full border border-gray-300 rounded-lg p-2 outline-none"></select>
                <select id="receive-item" required onchange="checkItemType('receive')" class="w-full border border-gray-300 rounded-lg p-2 outline-none"><option value="">-- เลือกอุปกรณ์ --</option></select>
                <div id="receive-fiber-fields" class="hidden space-y-2"><input type="text" id="receive-po" placeholder="เลข PO" class="w-full border p-2 rounded"><input type="text" id="receive-drum-no" placeholder="Drum No" class="w-full border p-2 rounded"><input type="text" id="receive-batch" placeholder="Batch No" class="w-full border p-2 rounded"></div>
                <input type="number" id="receive-qty" min="1" step="0.01" required placeholder="จำนวน" class="w-full border border-gray-300 rounded-lg p-2 font-bold">
                <input type="text" id="receive-remark" placeholder="หมายเหตุ" class="w-full border border-gray-300 rounded-lg p-2">
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">บันทึกรับเข้าคลัง</button>
            </form>
        </div>
    </div>

    <div id="transfer-form-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-lg w-11/12 max-w-md max-h-[90vh] overflow-y-auto p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-purple-700">🔄 โอนย้ายอุปกรณ์</h2>
                <button onclick="closeModal('transfer-form-modal')" class="text-gray-500 hover:text-red-500 text-2xl font-bold">&times;</button>
            </div>
            <form id="transferForm" onsubmit="submitTransactionForm(event, 'TRANSFER')" class="space-y-3">
                <select id="transfer-from-warehouse" required onchange="onTransferSrcWarehouseChange()" class="w-full border border-gray-300 rounded-lg p-2 outline-none"></select>
                <select id="transfer-to" required class="w-full border border-gray-300 rounded-lg p-2 outline-none"><option value="">-- เลือกทีมปลายทาง --</option></select>
                <select id="transfer-item" required onchange="checkItemType('transfer')" class="w-full border border-gray-300 rounded-lg p-2 outline-none"><option value="">-- เลือกอุปกรณ์ --</option></select>
                <div id="transfer-fiber-fields" class="hidden"><select id="transfer-drum" class="w-full border border-gray-300 rounded-lg p-2"><option value="">-- เลือกม้วนสาย --</option></select></div>
                <input type="number" id="transfer-qty" min="1" step="0.01" required placeholder="จำนวน" class="w-full border border-gray-300 rounded-lg p-2 font-bold">
                <input type="text" id="transfer-remark" placeholder="หมายเหตุ" class="w-full border border-gray-300 rounded-lg p-2">
                <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg">ยืนยันการโอนย้าย</button>
            </form>
        </div>
    </div>

    <div id="history-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-gray-100 rounded-xl shadow-lg w-11/12 max-w-md max-h-[90vh] flex flex-col">
            <div class="bg-white p-4 rounded-t-xl border-b flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-700">📋 ประวัติรายการล่าสุด</h2>
                <button onclick="closeModal('history-modal')" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <div id="history-list" class="p-4 space-y-3 overflow-y-auto flex-1"></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2010453338-iG1ZDSQ8"; 
        async function initializeLiff() {
            try { await liff.init({ liffId: LIFF_ID }); if (liff.isLoggedIn()) { getUserProfile(); } else { liff.login(); } } 
            catch (err) { Swal.fire('Error', 'ไม่สามารถเชื่อมต่อระบบ LINE ได้', 'error'); }
        }
        async function getUserProfile() {
            try { const profile = await liff.getProfile(); document.getElementById('user-profile-img').src = profile.pictureUrl; document.getElementById('user-profile-img').classList.remove('hidden'); checkUserAccess(profile); } 
            catch (err) { Swal.fire('Error', 'ไม่สามารถดึงข้อมูลโปรไฟล์ได้', 'error'); }
        }
        window.onload = function() { initializeLiff(); };
    </script>
    <script src="app.js"></script>?v=2
</body>
</html>
